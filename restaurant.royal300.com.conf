server {
    server_name restaurant.royal300.com;

    root /var/www/royal_restaurant;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/restaurant.royal300.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/restaurant.royal300.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = restaurant.royal300.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name restaurant.royal300.com;
    return 404; # managed by Certbot


}